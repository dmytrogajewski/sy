# ~/.config/foot/foot.ini — rendered by sy
font=JetBrainsMono Nerd Font:size=11
dpi-aware=yes
pad=10x10
initial-window-size-chars=100x30
selection-target=both

[mouse]
hide-when-typing=yes

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5
blink=yes

[colors]
alpha=1.0
background={{ colors.bg | replace("#", "") }}
foreground={{ colors.fg | replace("#", "") }}
selection-foreground={{ colors.fg | replace("#", "") }}
selection-background={{ colors.bg2 | replace("#", "") }}

# Normal
regular0={{ colors.bg1 | replace("#", "") }}
regular1={{ colors.red | replace("#", "") }}
regular2={{ colors.green | replace("#", "") }}
regular3={{ colors.yellow | replace("#", "") }}
regular4={{ colors.blue | replace("#", "") }}
regular5={{ colors.purple | replace("#", "") }}
regular6={{ colors.aqua | replace("#", "") }}
regular7={{ colors.fg_dim | replace("#", "") }}

# Bright
bright0={{ colors.bg2 | replace("#", "") }}
bright1={{ colors.red | replace("#", "") }}
bright2={{ colors.green | replace("#", "") }}
bright3={{ colors.yellow | replace("#", "") }}
bright4={{ colors.blue | replace("#", "") }}
bright5={{ colors.purple | replace("#", "") }}
bright6={{ colors.aqua | replace("#", "") }}
bright7={{ colors.fg | replace("#", "") }}

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
search-start=Control+Shift+r
font-increase=Control+plus Control+equal
font-decrease=Control+minus
font-reset=Control+0
